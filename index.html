<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SUP App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ─────────────────────────────────────────
       VIEW: HOME — Selección de playa
  ───────────────────────────────────────── -->
  <div id="view-home" class="view view--home active">

    <div class="home__top">
      <div class="logo-placeholder">SUP APP</div>
      <div class="illus-placeholder illus-placeholder--home"></div>
    </div>

    <div class="home__spots">
      <!-- Spots + botón añadir en grid 2 columnas — renderizado por JS -->
      <div class="spots-row" id="spots-row"></div>
    </div>

  </div>


  <!-- ─────────────────────────────────────────
       VIEW: RESULTS — Diagnóstico
  ───────────────────────────────────────── -->
  <div id="view-results" class="view view--results">

    <header class="results__header">
      <button class="btn-back" id="btn-back">←</button>
      <span class="results__spot-name" id="results-spot-name">Pont del Petroli</span>
    </header>

    <div class="results__main">

      <!-- Capa 2: Alerta offshore -->
      <div class="offshore-alert hidden" id="offshore-alert">
        <div class="illus-placeholder illus-placeholder--offshore"></div>
        <p>
          <strong>Ojo al viento terral</strong> — El viento sopla de tierra hacia el mar.
          El agua parece en calma, pero te puede arrastrar lejos sin darte cuenta.
          Si sales, no te alejes de la orilla.
        </p>
      </div>

      <!-- Capa 1: Diagnóstico principal -->
      <div class="diagnosis">
        <div class="illus-placeholder illus-placeholder--results" id="diagnosis-illus"></div>
        <h1 class="diagnosis__title" id="diagnosis-title">Cargando...</h1>
        <p class="diagnosis__desc" id="diagnosis-desc"></p>
      </div>

      <!-- Capa 3: Drum de métricas -->
      <div class="metrics-drum" id="metrics-drum">

        <!-- Viento -->
        <div class="drum-item" id="drum-wind">
          <div class="drum-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/>
            </svg>
          </div>
          <div class="drum-item__body">
            <div class="drum-item__main">
              <span class="drum-item__name">Viento</span>
              <span class="drum-item__value" id="dv-wind">—</span>
              <span class="drum-item__label" id="dl-wind"></span>
            </div>
            <p class="drum-item__phrase" id="dp-wind"></p>
          </div>
        </div>

        <!-- Ola -->
        <div class="drum-item" id="drum-wave">
          <div class="drum-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
              <path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
              <path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/>
            </svg>
          </div>
          <div class="drum-item__body">
            <div class="drum-item__main">
              <span class="drum-item__name">Ola</span>
              <span class="drum-item__value" id="dv-wave">—</span>
              <span class="drum-item__label" id="dl-wave"></span>
            </div>
            <p class="drum-item__phrase" id="dp-wave"></p>
          </div>
        </div>

        <!-- Rachas -->
        <div class="drum-item" id="drum-gusts">
          <div class="drum-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </div>
          <div class="drum-item__body">
            <div class="drum-item__main">
              <span class="drum-item__name">Rachas</span>
              <span class="drum-item__value" id="dv-gusts">—</span>
              <span class="drum-item__label" id="dl-gusts"></span>
            </div>
            <p class="drum-item__phrase" id="dp-gusts"></p>
          </div>
        </div>

        <!-- Período -->
        <div class="drum-item" id="drum-period">
          <div class="drum-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 2h4"/><path d="M12 14v-4"/>
              <path d="M4 13a8 8 0 0 1 8-7 8 8 0 1 1-5.3 14L4 17.6"/>
              <path d="M9 17H4v5"/>
            </svg>
          </div>
          <div class="drum-item__body">
            <div class="drum-item__main">
              <span class="drum-item__name">Período</span>
              <span class="drum-item__value" id="dv-period">—</span>
              <span class="drum-item__label" id="dl-period"></span>
            </div>
            <p class="drum-item__phrase" id="dp-period"></p>
          </div>
        </div>

        <!-- Dirección -->
        <div class="drum-item" id="drum-dir">
          <div class="drum-item__icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
            </svg>
          </div>
          <div class="drum-item__body">
            <div class="drum-item__main">
              <span class="drum-item__name">Dirección</span>
              <span class="drum-item__value" id="dv-dir">—</span>
              <span class="drum-item__label" id="dl-dir"></span>
            </div>
            <p class="drum-item__phrase" id="dp-dir"></p>
          </div>
        </div>

      </div><!-- /metrics-drum -->

    </div><!-- /results__main -->

    <!-- Barra temporal -->
    <div class="time-bar">
      <input
        type="range"
        class="time-slider"
        id="time-slider"
        min="0"
        max="48"
        value="0"
      >
      <div class="time-bar__label" id="time-bar-label">Hoy · Mañana</div>
    </div>

  </div>


  <!-- ─────────────────────────────────────────
       OVERLAY: Añadir playa
  ───────────────────────────────────────── -->
  <div id="overlay-add-spot" class="overlay hidden">
    <div class="overlay__panel">
      <div class="overlay__header">
        <span>Buscar playa</span>
        <button class="btn-close-overlay" id="btn-close-overlay">✕</button>
      </div>

      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Valencia, Tarragona..."
        autocomplete="off"
      >

      <ul class="search-results" id="search-results">
        <!-- Renderizado por JS -->
      </ul>

      <div class="add-spot-confirm hidden" id="add-spot-confirm">
        <input
          type="text"
          class="search-input"
          id="spot-name-input"
          placeholder="Nombre para este spot"
        >
        <button class="btn-save-spot" id="btn-save-spot">Guardar</button>
      </div>
    </div>
  </div>


  <script src="js/storage.js"></script>
  <script src="js/score.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
